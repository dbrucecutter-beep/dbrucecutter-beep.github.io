<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café One80</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        .logo-font { font-family: 'Playfair Display', serif; }
        .hero-text { text-shadow: 0 4px 30px rgba(0,0,0,0.85); }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <!-- Navbar -->
    <nav class="bg-black/90 backdrop-blur sticky top-0 z-50 border-b border-zinc-800">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="text-orange-400 font-medium tracking-wider text-sm">
                LIVE MUSIC • COMMUNITY • HOPE
            </div>
            <a href="tel:7023765543" class="bg-orange-600 hover:bg-orange-500 px-6 py-3 rounded-full font-medium flex items-center gap-2 text-sm">
                <span class="text-xl">☎</span> (702) 376-5543
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="relative min-h-screen flex items-center overflow-hidden">
        <img src="images/Crowd.png" 
             alt="Café One80 Live Music" 
             class="absolute inset-0 w-full h-full object-cover hidden md:block">
        
        <img src="images/Crowd-Mobile.png" 
             alt="Café One80 Live Music" 
             class="absolute inset-0 w-full h-full object-cover md:hidden">
        
        <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/50 to-black/75"></div>
        
        <div class="relative z-10 max-w-4xl mx-auto px-6 text-center pt-24 md:pt-12">
            <img src="images/Round-3.png" alt="Café One80 Logo" 
                 class="h-32 md:h-44 mx-auto mb-6">
            
            <h1 class="hero-text text-5xl md:text-7xl font-bold logo-font tracking-tighter leading-none mb-6">
                FAITH<br>MUSIC<br>COMMUNITY
            </h1>
            
            <p class="hero-text text-3xl md:text-4xl text-orange-200 italic mb-12">You Belong Here.</p>
        </div>
    </header>

</body>
</html>
